name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Analyze & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1"
          channel: stable
          cache: true

      - name: Print versions
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      # Generated Isar code (*.g.dart) is committed, so the project builds
      # without this. We regenerate in CI to guarantee it stays in sync.
      - name: Regenerate Isar code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test
