name: timetable
description: A local-only college class timetable app (Phase 1).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Local persistence
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3

  # IDs
  uuid: ^4.4.0

  cupertino_icons: ^1.0.8
  home_widget: ^0.9.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  # Isar code generation
  build_runner: ^2.4.11
  isar_generator: ^3.1.0+1

  # App launcher icon generation
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

# App icon generation (run: dart run flutter_launcher_icons)
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  min_sdk_android: 21
